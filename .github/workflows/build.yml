name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libuv1-dev libssl-dev libhwloc-dev zip

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package artifact (Linux)
        run: |
          ZIP_NAME=build-linux-${{ github.run_id }}.zip
          zip -r "$ZIP_NAME" build
          echo "artifact=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-${{ github.run_id }}
          path: build-linux-${{ github.run_id }}.zip

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake libuv openssl@3 hwloc
          brew install zip

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Package artifact (macOS)
        run: |
          ZIP_NAME=build-macos-${{ github.run_id }}.zip
          zip -r "$ZIP_NAME" build
          echo "artifact=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-${{ github.run_id }}
          path: build-macos-${{ github.run_id }}.zip

  windows:
    runs-on: windows-latest

    env:
      LIBUV_VERSION: 1.44.2
      OPENSSL_VERSION: 3.0.16

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            autoconf
            automake
            libtool
            make
            perl
            tar
            wget
            zip
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja

      - name: Build Windows 7 dependencies
        shell: msys2 {0}
        run: |
          export UV_VERSION="$LIBUV_VERSION"
          export OPENSSL_VERSION="$OPENSSL_VERSION"
          export CFLAGS="-D_WIN32_WINNT=0x0601 -DWINVER=0x0601"
          export CXXFLAGS="$CFLAGS"
          export OPENSSL_CONFIG_FLAGS="$CFLAGS"
          ./scripts/build.uv.sh
          ./scripts/build.openssl3.sh

      - name: Configure
        shell: msys2 {0}
        run: |
          DEPS_DIR="$(pwd)/deps"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DWITH_WIN7_COMPAT=ON \
            -DWITH_TLS=ON \
            -DWITH_HWLOC=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_OPENCL=OFF \
            -DXMRIG_DEPS="$DEPS_DIR" \
            -DOPENSSL_ROOT_DIR="$DEPS_DIR" \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Package artifact (Windows)
        shell: powershell
        run: |
          $dist = "dist\windows7-x64"
          New-Item -ItemType Directory -Force $dist | Out-Null
          Copy-Item "build\*.exe" $dist -Force
          Copy-Item "build\*.cmd" $dist -Force -ErrorAction SilentlyContinue
          Copy-Item "build\WinRing0x64.sys" $dist -Force -ErrorAction SilentlyContinue

          $zip = "xmrig-windows7-x64-tls-${{ github.run_id }}.zip"
          Compress-Archive -Path "$dist\*" -DestinationPath $zip -Force
          echo "artifact=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-windows7-x64-tls-${{ github.run_id }}
          path: xmrig-windows7-x64-tls-${{ github.run_id }}.zip
          retention-days: 14
